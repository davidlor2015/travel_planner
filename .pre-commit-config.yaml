repos:
  # ── Python: Ruff (lint + format) ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(app|tests)/
      - id: ruff-format
        files: ^(app|tests)/

  # ── Web frontend: ESLint ──────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint-web
        name: ESLint (web)
        language: node
        entry: bash -c 'cd ui && npm run lint'
        files: ^ui/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ── Mobile: ESLint via Expo ───────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint-mobile
        name: ESLint (mobile)
        language: node
        entry: bash -c 'cd ui-mobile && npx expo lint'
        files: ^ui-mobile/(app|features|shared|providers)/.*\.(ts|tsx)$
        pass_filenames: false
